name: LaunchPoint CI/CD

on:
  push:
    branches:
      - '**'
      - '!main'
    tags:
      - 'v*.*.*'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run on push events (not tags, not PRs)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main (owner only)
        if: github.actor == 'khaledAbdalbasit'
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merging branch '${BRANCH}' into main..."
          git config --global user.name "Khaled Abdalbasit"
          git config --global user.email "khaled@launchpoint.dev"
          git fetch origin main
          git checkout main
          git merge --no-ff "origin/${BRANCH}" -m "chore: merge '${BRANCH}' into main [auto]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  enable-automerge-for-others:
    runs-on: ubuntu-latest
    # Only run on pull_request events from non-owners
    if: github.event_name == 'pull_request' && github.actor != 'khaledAbdalbasit'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable Auto Merge for PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          merge-method: squash
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}

  publish-packagist:
    runs-on: ubuntu-latest
    # Only publish when main branch is updated or a version tag is pushed
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Notify Packagist of update
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"https://github.com/khaledAbdalbasit/Laravel-LaunchPoint\"}}" \
            "https://packagist.org/api/update-package?username=khaledabdalbasit&apiToken=${PACKAGIST_TOKEN}"
