name: LaunchPoint CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Conditional Merge
        run: |
          if [ "${GITHUB_ACTOR}" = "khaledAbdalbasit" ]; then
            echo "You pushed, merge directly"
            git config --global user.name "Khaled Abdalbasit"
            git config --global user.email "YOUR_EMAIL@example.com"
            git fetch origin main
            git checkout main
            git merge --squash ${{ github.ref_name }} -m "Direct merge by Khaled"
            git push origin main
          else
            echo "Someone else pushed, enable auto-merge on PR"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        shell: bash

      - name: Enable Auto Merge for PR
        if: github.actor != 'khaledAbdalbasit'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          merge-method: squash
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}

  publish-packagist:
    runs-on: ubuntu-latest
    needs: auto-merge
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json

      - name: Install Composer
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Publish to Packagist
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"https://github.com/khaledAbdalbasit/Laravel-LaunchPoint\"}}" \
            "https://packagist.org/api/update-package?username=khaledabdalbasit&apiToken=${PACKAGIST_TOKEN}"
